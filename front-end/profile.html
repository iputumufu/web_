<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Sekolah Kita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .toggle-dot { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input:checked ~ .toggle-dot { transform: translateX(1.25rem); }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-blue-200 dark:shadow-none">SK</div>
                <div class="leading-tight">
                    <span class="text-lg font-extrabold text-gray-800 dark:text-white block tracking-tight">Sekolah</span>
                    <span class="text-sm font-bold text-blue-600 uppercase tracking-tighter">Kita</span>
                </div>
            </a>
        </div>
        
        <div class="flex items-center gap-4">
            <label for="dark-toggle" class="flex items-center cursor-pointer">
                <div class="relative">
                    <input type="checkbox" id="dark-toggle" class="sr-only" onchange="toggleDarkMode()">
                    <div class="block bg-gray-200 dark:bg-gray-700 w-12 h-7 rounded-full transition-colors border border-transparent dark:border-gray-600"></div>
                    <div class="toggle-dot absolute left-1 top-1 bg-white dark:bg-blue-500 w-5 h-5 rounded-full shadow flex items-center justify-center text-[10px]">
                        <span id="toggle-icon">☀️</span>
                    </div>
                </div>
            </label>

            <!-- User Menu -->
            <div class="relative" id="user-menu-container">
                <!-- Will be populated by JS -->
            </div>
        </div>
    </nav>

    <!-- Profile Content -->
    <div class="max-w-4xl mx-auto px-4 py-12">
        <!-- Page Header -->
        <div class="mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 mb-4">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Kembali ke Beranda
            </a>
            <h1 class="text-3xl font-bold text-gray-800 dark:text-white">Profil Saya</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Kelola informasi akun Anda</p>
        </div>

        <!-- Alert Messages -->
        <div id="alert-container" class="mb-4 hidden">
            <div id="alert-message" class="p-4 rounded-lg text-sm font-medium"></div>
        </div>

        <!-- Profile Card -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
            <!-- Avatar Section -->
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 px-8 py-8">
                <div class="flex items-center gap-6">
                    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-lg" id="avatar-container">
                        <span id="avatar-initial" class="text-3xl font-bold text-blue-600"></span>
                    </div>
                    <div>
                        <h2 id="user-name" class="text-2xl font-bold text-white"></h2>
                        <p id="user-email" class="text-blue-100"></p>
                    </div>
                </div>
            </div>

            <!-- Profile Form -->
            <div class="p-8">
                <form id="profile-form" class="space-y-6">
                    <!-- Name -->
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Nama Lengkap</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <input type="text" id="name" name="name" required
                                class="input-focus w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-gray-600 transition-colors">
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                                </svg>
                            </div>
                            <input type="email" id="email" name="email" required
                                class="input-focus w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-gray-600 transition-colors">
                        </div>
                    </div>

                    <!-- Account Info -->
                    <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
                        <h3 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-4">Informasi Akun</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-4">
                                <p class="text-xs text-gray-500 dark:text-gray-400">ID Akun</p>
                                <p id="user-id" class="text-sm font-medium text-gray-800 dark:text-white mt-1"></p>
                            </div>
                            <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-4">
                                <p class="text-xs text-gray-500 dark:text-gray-400">Tanggal Registrasi</p>
                                <p id="user-created" class="text-sm font-medium text-gray-800 dark:text-white mt-1"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex justify-end gap-4 pt-4">
                        <button type="submit" id="submit-btn"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-blue-200 dark:shadow-none hover:shadow-xl transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2">
                            <span id="btn-text">Simpan Perubahan</span>
                            <svg id="btn-loader" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Logout Section -->
        <div class="mt-8 bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="font-semibold text-gray-800 dark:text-white">Keluar dari Akun</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Anda akan keluar dari akun ini</p>
                </div>
                <button onclick="logout()" class="bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 text-red-600 dark:text-red-400 font-medium py-2 px-4 rounded-xl transition-colors flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    Keluar
                </button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Dark Mode Toggle
        const html = document.documentElement;
        const icon = document.getElementById('toggle-icon');
        const checkbox = document.getElementById('dark-toggle');

        function toggleDarkMode() {
            if (checkbox.checked) {
                html.classList.add('dark');
                icon.innerText = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                html.classList.remove('dark');
                icon.innerText = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                html.classList.add('dark');
                checkbox.checked = true;
                icon.innerText = '🌙';
            }
        }

        // Check authentication and load user data
        window.onload = async function() {
            initTheme();
            
            // Check if user is logged in
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // Update navbar user menu
            updateUserMenu();

            // Load user data
            await loadUserData();
        };

        async function loadUserData() {
            try {
                const response = await fetch('http://localhost:8000/api/user', {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const user = data.user;
                    
                    // Update profile form
                    document.getElementById('name').value = user.name;
                    document.getElementById('email').value = user.email;
                    document.getElementById('user-name').textContent = user.name;
                    document.getElementById('user-email').textContent = user.email;
                    document.getElementById('user-id').textContent = '#' + user.id;
                    
                    // Avatar initial
                    document.getElementById('avatar-initial').textContent = user.name.charAt(0).toUpperCase();
                    
                    // Created date
                    const createdDate = new Date(user.created_at);
                    document.getElementById('user-created').textContent = createdDate.toLocaleDateString('id-ID', {
                        day: 'numeric',
                        month: 'long',
                        year: 'numeric'
                    });
                } else {
                    // Token expired
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        // Update profile form
        document.getElementById('profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            
            // Show loading
            submitBtn.disabled = true;
            btnText.textContent = 'Menyimpan...';
            btnLoader.classList.remove('hidden');
            
            try {
                const response = await fetch('http://localhost:8000/api/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ name, email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('user-name').textContent = data.user.name;
                    document.getElementById('user-email').textContent = data.user.email;
                    document.getElementById('avatar-initial').textContent = data.user.name.charAt(0).toUpperCase();
                    
                    // Update localStorage user
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Update navbar
                    updateUserMenu();
                    
                    showAlert('success', 'Profil berhasil diperbarui!');
                } else {
                    let errorMessage = data.message || 'Gagal memperbarui profil.';
                    if (data.errors) {
                        const firstError = Object.values(data.errors)[0];
                        errorMessage = Array.isArray(firstError) ? firstError[0] : firstError;
                    }
                    showAlert('error', errorMessage);
                }
            } catch (error) {
                showAlert('error', 'Terjadi kesalahan. Pastikan server backend berjalan.');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Simpan Perubahan';
                btnLoader.classList.add('hidden');
            }
        });

        function showAlert(type, message) {
            const container = document.getElementById('alert-container');
            const alertMessage = document.getElementById('alert-message');
            
            container.classList.remove('hidden');
            if (type === 'success') {
                alertMessage.className = 'p-4 rounded-lg text-sm font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200';
            } else {
                alertMessage.className = 'p-4 rounded-lg text-sm font-medium bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200';
            }
            alertMessage.textContent = message;
            
            setTimeout(() => {
                container.classList.add('hidden');
            }, 5000);
        }

        function logout() {
            if (confirm('Apakah Anda yakin ingin keluar?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
