    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Update navbar auth state first
            updateNavbar();
            
            // Init theme toggle (professional implementation)
            const html = document.documentElement;
            const toggleBtn = document.querySelector('.theme-toggle');
            
            function initTheme() {
                const savedTheme = localStorage.getItem('color-theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                
                if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                    html.classList.add('dark');
                }
            }
            
            function toggleDarkMode() {
                html.classList.toggle('dark');
                const isDark = html.classList.contains('dark');
                localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
            }
            
            // Add theme toggle button to navbar if not exists
            if (!toggleBtn && window.innerWidth >= 1024) {
                const userContainer = document.getElementById('user-menu-container');
                if (userContainer) {
                    userContainer.insertAdjacentHTML('beforebegin', 
                        '<button class="theme-toggle p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Toggle dark mode">' +
                        '<svg id="theme-sun" class="w-5 h-5 hidden dark:inline text-yellow-500" fill="currentColor" viewBox="0 0 20 20">' +
                        '<path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path>' +
                        '</svg>' +
                        '<svg id="theme-moon" class="w-5 h-5 inline dark:hidden text-gray-700 dark:text-gray-300" fill="currentColor" viewBox="0 0 20 20">' +
                        '<path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>' +
                        '</svg>' +
                        '</button>');
                    
                    const newToggle = document.querySelector('.theme-toggle');
                    newToggle.addEventListener('click', toggleDarkMode);
                }
            }
            
            initTheme();
        });
    </script>
