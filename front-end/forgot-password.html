<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Masak Yuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
        }
        .forgot-password-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            /* Pastikan path gambar sesuai dengan lokasi file gambarmu */
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('../assets/1774422389023.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .forgot-password-panel {
            margin-top: 1.5rem;
        }

        @media (min-width: 1024px) {
            .forgot-password-panel {
                margin-top: -4.5rem;
            }
        }

        @media (max-width: 767px) {
            .forgot-password-panel {
                margin-top: 4.5rem;
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

    <!-- Navbar -->
 

    <div class="forgot-password-container items-center justify-center px-4">
        <div class="forgot-password-panel w-full max-w-md">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-[#597750] rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-white drop-shadow-md">Lupa Password?</h1>
                <p class="text-emerald-50 mt-2 font-medium">Masukkan email Anda untuk menerima link reset</p>
            </div>

            <div class="glass-card rounded-3xl p-8 shadow-2xl">
                
                <div id="alert-container" class="mb-4 hidden">
                    <div id="alert-message" class="p-4 rounded-xl text-sm font-medium"></div>
                </div>

                <div id="success-container" class="hidden text-center">
                    <div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Link Terkirim</h2>
                    <p class="text-gray-600 leading-relaxed">
                        Jika email terdaftar, link reset password sudah dikirim. Silakan cek inbox atau folder spam Anda.
                    </p>
                    <a href="login.html" class="mt-6 inline-flex items-center justify-center rounded-xl bg-[#597750] px-5 py-3 font-bold text-white shadow-lg transition-all duration-200 hover:bg-[#4b6544]">
                        Kembali ke Login
                    </a>
                </div>

                <form id="forgot-password-form">
                    <div class="space-y-5">
                        <div>
                            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Alamat Email</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                                    </svg>
                                </div>
                                <input type="email" id="email" name="email" required
                                    class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all"
                                    placeholder="nama@email.com">
                            </div>
                        </div>

                        <button type="submit" id="submit-btn"
                            class="w-full bg-[#597750] hover:bg-[#4b6544] text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-[0_18px_40px_rgba(89,119,80,0.28)] transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2">
                            <span id="btn-text">Kirim Link Reset</span>
                            <svg id="btn-loader" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </div>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                    <p class="text-gray-600">
                        Ingat password Anda? 
                        <a href="login.html" class="font-bold text-emerald-600 hover:text-emerald-700 underline decoration-2 underline-offset-4">Masuk sekarang</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const html = document.documentElement;
        const form = document.getElementById('forgot-password-form');
        const successContainer = document.getElementById('success-container');

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            
            // Show loading
            submitBtn.disabled = true;
            btnText.textContent = 'Mengirim...';
            btnLoader.classList.remove('hidden');
            
            try {
                const response = await fetch('http://localhost:8000/api/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });
                
                const rawResponse = await response.text();
                let data = {};

                try {
                    data = rawResponse ? JSON.parse(rawResponse) : {};
                } catch (parseError) {
                    data = {
                        success: false,
                        message: response.ok
                            ? 'Respons server tidak valid.'
                            : 'Server mengembalikan respons yang tidak bisa dibaca.',
                    };
                }
                
                if (response.ok && data.success) {
                    form.classList.add('hidden');
                    successContainer.classList.remove('hidden');
                } else {
                    let errorMessage = data.message || 'Gagal mengirim link reset. Silakan coba lagi.';
                    if (data.errors) {
                        const firstError = Object.values(data.errors)[0];
                        errorMessage = Array.isArray(firstError) ? firstError[0] : firstError;
                    }
                    showAlert('error', errorMessage);
                }
            } catch (error) {
                showAlert('error', 'Terjadi kesalahan. Pastikan server backend berjalan.');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Kirim Link Reset';
                btnLoader.classList.add('hidden');
            }
        });

        function showAlert(type, message) {
            const container = document.getElementById('alert-container');
            const alertMessage = document.getElementById('alert-message');
            
            container.classList.remove('hidden');
            if (type === 'success') {
                alertMessage.className = 'p-4 rounded-lg text-sm font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200';
            } else {
                alertMessage.className = 'p-4 rounded-lg text-sm font-medium bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200';
            }
            alertMessage.textContent = message;
            
            setTimeout(() => {
                container.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
